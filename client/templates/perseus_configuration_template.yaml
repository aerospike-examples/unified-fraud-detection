aerospikeConfiguration:
  hosts:
    -
      ip: "_IP_"
      port: _PORT_
  username: "_USERNAME_"
  password: "_PASSWORD_"
  namespace: "_NAMESPACE_NAME_"
  set: "test"
  truncateSet: _TRUNCATE_SET_
  tlsPath: "/root/.aerospike/truststore.jks"
outputWindowConfiguration:
  printIntervalSec: 1
  numberOfLinesBeforeReprintingTheHeader: 25
  columnWidth: 11
testConfiguration:
  perseusId: _PERSEUS_ID_
  recordSize: _RECORD_SIZE_
  readBatchSize: _BATCH_READ_SIZE_
  writeBatchSize: _BATCH_WRITE_SIZE_
  readHitRatio: _READ_HIT_RATIO_
  stringIndex: _STRING_INDEX_
  numericIndex: _NUMERIC_INDEX_
  geoSpatialIndex: _GEO_SPATIAL_INDEX_
  udfAggregation: _UDF_AFFREGATION_
  rangeQuery: _RANGE_QUERY_
  rangeQueryConfiguration:
    maxTimeRangeChance: _CHANCE_OF_MAX_
    maxTimeRange: _MAX_RANGE_
    normalTimeRange: _NORMAL_RANGE_